<div id="tour"></div>
<script type="module">
import { sanity } from "../script.js"

const parts = window.location.pathname.split("/")
const slug = parts[parts.length - 1]   // "albanian-riviera"
console.log("Slug:", slug)

const tour = await sanity.fetch(`
  *[_type == "tour" && slug.current == $slug][0]
`, { slug })
console.log("Slug:", slug)

if (!tour) {
  document.body.innerHTML = "<h1>Tour not found</h1>"
  throw new Error("Tour not found")
} else {
const container = document.getElementById("tour")
  const el = document.createElement("div")
  el.innerHTML = `
    <h2>${tour.title}</h2>
    <p>${tour.summary || ""}</p>
    <p>€${tour.price}</p>
    <a href="/tour.html?slug=${tour.slug.current}">View tour</a>
  `
  container.appendChild(el)
}
</script>
