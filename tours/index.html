<div id="tours"></div>

<script type="module">
import { getTours } from "/script.js"

const container = document.getElementById("tours")

const tours = await getTours()
console.log("Tours:", tours)

tours.forEach(tour => {
  const el = document.createElement("div")
  el.innerHTML = `
    <h2>${tour.title}</h2>
    <p>${tour.summary || ""}</p>
    <p>€${tour.price}</p>
    <a href="/tour.html?slug=${tour.slug.current}">View tour</a>
  `
  container.appendChild(el)
})
